<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Salsa &amp; Arkan</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Sans:opsz,wght@9..40,300..700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --cream: #F7F1E7;
    --ink: #2B241D;
    --ink-soft: #756E63;
    --serif: 'Cormorant Garamond', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--cream); color: var(--ink); font-family: var(--sans); }
  body { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---------- config ---------- */
const COUPLE = "Salsa & Arkan";
const HERO_PHOTO = ""; // <-- put your main hero image URL here
// Anchor each side photo to its screen edge. `edge` = which side it tucks into.
// `offset` = distance from that edge in final state (negative = bleeds off-screen).
const SIDE_PHOTOS = [
  // LEFT COLUMN
  { id: "tl", src: "", tone: "sunset", edge: "left",  offset: "-2%", finalTop: "4%",  w: "30%", h: "44%", rot: 0, appearAt: 0.30 },
  { id: "bl", src: "", tone: "bw",     edge: "left",  offset: "8%",  finalTop: "55%", w: "22%", h: "30%", rot: 0, appearAt: 0.50 },
  // RIGHT COLUMN
  { id: "tr", src: "", tone: "cliff",  edge: "right", offset: "-1%", finalTop: "32%", w: "26%", h: "32%", rot: 0, appearAt: 0.40 },
  { id: "br", src: "", tone: "rocks",  edge: "right", offset: "-2%", finalTop: "65%", w: "23%", h: "33%", rot: 0, appearAt: 0.60 },
];
const HERO_FINAL = { left: "31%", top: "10%", w: "38%", h: "85%", radius: 28 };

/* ---------- math ---------- */
const lerp = (a, b, t) => a + (b - a) * t;
const clamp = (v, a = 0, b = 1) => Math.min(b, Math.max(a, v));
const ease = (t) => 1 - Math.pow(1 - clamp(t), 3);
const easeInOut = (t) => { t = clamp(t); return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; };
function lerpCss(a, b, t) {
  // works for "Npx" or "Nvw" / "Nvh" / "N%" — same unit on both ends
  const ma = String(a).match(/^(-?[\d.]+)(.*)$/);
  const mb = String(b).match(/^(-?[\d.]+)(.*)$/);
  if (!ma || !mb) return b;
  return `${lerp(parseFloat(ma[1]), parseFloat(mb[1]), t)}${ma[2] || mb[2]}`;
}

/* ---------- placeholder image ---------- */
function PhotoFill({ src, tone = "mountain" }) {
  if (src) {
    return <img src={src} alt="" style={{ width: "100%", height: "100%", objectFit: "cover", display: "block" }} />;
  }
  const palettes = {
    mountain: ["oklch(0.78 0.06 230)", "oklch(0.6 0.07 145)", "oklch(0.42 0.06 130)"],
    sunset:   ["oklch(0.72 0.12 50)",  "oklch(0.55 0.15 35)", "oklch(0.32 0.07 30)"],
    bw:       ["oklch(0.78 0 0)",       "oklch(0.42 0 0)",     "oklch(0.22 0 0)"],
    cliff:    ["oklch(0.74 0.05 215)", "oklch(0.48 0.05 200)","oklch(0.34 0.04 210)"],
    rocks:    ["oklch(0.72 0.04 60)",  "oklch(0.5 0.06 55)",  "oklch(0.34 0.07 45)"],
  };
  const [a, b, c] = palettes[tone] || palettes.mountain;
  return (
    <div style={{
      width: "100%", height: "100%",
      background: `linear-gradient(180deg, ${a} 0%, ${b} 55%, ${c} 100%)`,
      position: "relative",
    }}>
      <svg viewBox="0 0 200 120" preserveAspectRatio="none"
        style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.85 }}>
        <polygon points="0,90 30,55 55,75 80,30 110,65 140,40 170,70 200,55 200,120 0,120" fill="rgba(255,255,255,0.18)" />
        <polygon points="0,100 25,75 60,85 90,55 120,80 150,60 180,80 200,72 200,120 0,120" fill="rgba(0,0,0,0.18)" />
      </svg>
      <div style={{
        position: "absolute", inset: 0, mixBlendMode: "overlay",
        backgroundImage:
          "radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), radial-gradient(rgba(0,0,0,0.06) 1px, transparent 1px)",
        backgroundSize: "3px 3px, 5px 5px",
      }} />
    </div>
  );
}

/* ---------- nav ---------- */
function HeroNav({ inkOnLight }) {
  return (
    <div style={{
      position: "absolute", top: 18, left: "50%", transform: "translateX(-50%)",
      width: "min(720px, calc(100% - 32px))",
      background: "rgba(255, 252, 245, 0.85)",
      backdropFilter: "blur(14px)", WebkitBackdropFilter: "blur(14px)",
      border: "1px solid rgba(43,36,29,0.06)", borderRadius: 999,
      padding: "8px 8px 8px 22px",
      boxShadow: "0 6px 20px rgba(43,36,29,0.10)",
      display: "flex", alignItems: "center", justifyContent: "space-between",
      zIndex: 30,
    }}>
      <span style={{ fontFamily: "var(--serif)", fontStyle: "italic", fontSize: 20 }}>S&amp;A</span>
      <div style={{ display: "flex", alignItems: "center", gap: 22 }}>
        <a style={navItem}>Travel Logistics</a>
        <a style={navItem}>Registry</a>
        <a style={navItem}>FAQ</a>
        <button style={{
          background: "var(--ink)", color: "var(--cream)", border: 0, borderRadius: 999,
          padding: "9px 18px", fontFamily: "var(--sans)", fontSize: 13, fontWeight: 500, cursor: "pointer",
        }}>Submit RSVP</button>
      </div>
    </div>
  );
}
const navItem = { fontFamily: "var(--sans)", fontSize: 13, color: "var(--ink)", cursor: "pointer", textDecoration: "none" };

/* ---------- hero section ---------- */
function HeroSection() {
  const sectionRef = useRef(null);
  const [progress, setProgress] = useState(0);
  const [vw, setVw] = useState(typeof window !== "undefined" ? window.innerWidth : 1280);

  useEffect(() => {
    const onScroll = () => {
      const el = sectionRef.current;
      if (!el) return;
      const rect = el.getBoundingClientRect();
      const total = el.offsetHeight - window.innerHeight;
      const scrolled = -rect.top;
      setProgress(clamp(scrolled / total));
      setVw(window.innerWidth);
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    window.addEventListener("resize", onScroll);
    return () => {
      window.removeEventListener("scroll", onScroll);
      window.removeEventListener("resize", onScroll);
    };
  }, []);

  const isMobile = vw < 720;
  const e = easeInOut(progress);

  // Hero photo transforms
  const heroLeft = lerpCss("0%", HERO_FINAL.left, e);
  const heroTop = lerpCss("0%", HERO_FINAL.top, e);
  const heroW = lerpCss("100%", HERO_FINAL.w, e);
  const heroH = lerpCss("100%", HERO_FINAL.h, e);
  const heroRadius = lerp(0, HERO_FINAL.radius, e);

  // Couple name
  const nameOp = clamp(1 - progress * 1.5);
  const nameSc = lerp(1, 0.78, e);

  return (
    <section ref={sectionRef} style={{
      position: "relative",
      height: "300vh", // 3 viewports of scroll
      background: "var(--cream)",
    }}>
      <div style={{
        position: "sticky", top: 0,
        height: "100vh", width: "100%",
        overflow: "hidden",
      }}>
        <HeroNav />

        {/* Hero photo */}
        <div style={{
          position: "absolute",
          left: heroLeft, top: heroTop, width: heroW, height: heroH,
          borderRadius: heroRadius,
          overflow: "hidden",
          boxShadow: progress > 0.1 ? "0 20px 50px rgba(43,36,29,0.18)" : "none",
          transition: "box-shadow 0.4s ease",
        }}>
          <PhotoFill src={HERO_PHOTO} tone="mountain" />
          {/* Couple name */}
          <div style={{
            position: "absolute", inset: 0,
            display: "flex", alignItems: "center", justifyContent: "center",
            opacity: nameOp,
            transform: `scale(${nameSc})`,
            pointerEvents: "none",
            transition: "opacity 0.2s linear",
          }}>
            <h1 style={{
              margin: 0,
              fontFamily: "var(--serif)",
              fontStyle: "italic",
              fontWeight: 500,
              fontSize: isMobile ? "clamp(56px, 16vw, 120px)" : "clamp(80px, 13vw, 220px)",
              lineHeight: 0.95,
              color: "rgba(255,255,255,0.96)",
              textShadow: "0 2px 32px rgba(0,0,0,0.22)",
              whiteSpace: "nowrap",
              letterSpacing: "-0.01em",
            }}>{COUPLE}</h1>
          </div>

          {/* Scroll affordance */}
          <div style={{
            position: "absolute", left: 0, right: 0, bottom: 0,
            padding: "0 36px 28px",
            opacity: clamp(1 - progress / 0.2),
            pointerEvents: "none",
          }}>
            <div style={{ height: 1, background: "rgba(255,255,255,0.55)", marginBottom: 14 }} />
            <div style={{
              display: "flex", justifyContent: "space-between", alignItems: "center",
              color: "rgba(255,255,255,0.9)", fontFamily: "var(--sans)",
              fontSize: 11, letterSpacing: "0.32em", textTransform: "uppercase",
            }}>
              <span style={{ fontSize: 18 }}>↓</span>
              <span>scroll to explore</span>
            </div>
          </div>
        </div>

        {/* Side photos (desktop only) */}
        {!isMobile && SIDE_PHOTOS.map((ph) => {
          const t = clamp((progress - ph.appearAt) / (1 - ph.appearAt));
          const ee = ease(t);
          if (ee <= 0) return null;
          // Slide in from the side it tucks into. translateX from off-screen to 0.
          const slideDir = ph.edge === "left" ? -1 : 1;
          const tx = lerp(slideDir * 110, 0, ee);
          const sc = lerp(0.94, 1, ee);
          const rot = lerp(ph.rot * 1.6, ph.rot, ee);
          const posStyle = ph.edge === "left"
            ? { left: ph.offset }
            : { right: ph.offset };
          return (
            <div key={ph.id} style={{
              position: "absolute",
              ...posStyle,
              top: ph.finalTop,
              width: ph.w, height: ph.h,
              opacity: ee,
              transform: `translateX(${tx}%) scale(${sc}) rotate(${rot}deg)`,
              transformOrigin: "50% 50%",
              borderRadius: 24,
              overflow: "hidden",
              boxShadow: "0 12px 32px rgba(43,36,29,0.16)",
              zIndex: 10,
            }}>
              <PhotoFill src={ph.src} tone={ph.tone} />
            </div>
          );
        })}

        {/* Mobile: stacked photos below hero */}
        {isMobile && SIDE_PHOTOS.slice(0, 2).map((ph, i) => {
          const t = clamp((progress - 0.45 - i * 0.2) / 0.4);
          const ee = ease(t);
          if (ee <= 0) return null;
          return (
            <div key={ph.id} style={{
              position: "absolute",
              left: 24, right: 24,
              top: `calc(${i === 0 ? "65%" : "82%"} + ${lerp(20, 0, ee)}px)`,
              height: "16vh",
              opacity: ee,
              borderRadius: 18,
              overflow: "hidden",
              transform: `scale(${lerp(0.96, 1, ee)})`,
            }}>
              <PhotoFill src={ph.src} tone={ph.tone} />
            </div>
          );
        })}
      </div>
    </section>
  );
}

function App() {
  return (
    <>
      <HeroSection />
      {/* placeholder section after — to give scroll something to land on */}
      <section style={{
        minHeight: "100vh",
        background: "var(--cream)",
        display: "flex", alignItems: "center", justifyContent: "center",
        padding: "60px 24px",
      }}>
        <div style={{ textAlign: "center", maxWidth: 720 }}>
          <div style={{
            fontFamily: "var(--sans)", fontSize: 12,
            letterSpacing: "0.32em", textTransform: "uppercase",
            color: "var(--ink-soft)", marginBottom: 18,
          }}>— next section —</div>
          <h2 style={{
            fontFamily: "var(--serif)", fontStyle: "italic",
            fontSize: "clamp(36px, 6vw, 72px)", margin: 0, lineHeight: 1.05,
          }}>the rest of the story lives here.</h2>
        </div>
      </section>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
